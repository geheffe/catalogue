# Settings
baseurl = "https://geheffe.github.io/catalogue/"
#relativeURLs = true  # Cette ligne est cruciale pour les chemins locaux  
publishDir = "public"  # Assurez-vous que c'est bien le dossier de sortie
languageCode = "fr"
# Le TITRE principal du site (apparaît dans l'onglet du navigateur et dans les résultats Google)
title = "Françoise BOTREL REY - Artiste Peintre"
# La DESCRIPTION longue pour Google (balise meta, invisible sur la page)
description = "Site officiel de Françoise BOTREL REY Artiste peintre en Bretagne. Découvrez son catalogue, ses actualités, ses expositions et son univers artistique."
theme = "autophugo"
disableKinds = ["taxonomy", "term"]
#[taxonomies]
#    tag = "tags"
#    category = "categories"

[services]
    [services.googleAnalytics]
        ID = 'G-T2GZF6D03D'
[params]
    # Meta
    # Texte COURT pour l'affichage dans le pied de page (le "tagline")
    tagline = "La peinture de Françoise"
    keywords = "autophugo"
    #msvalidate = ""
    #googlesiteverification = ""
    thumb_width = 600
    thumb_quality = 75
    full_width = 1200
    full_quality = 85
    column_count = 2
    #breadcrumb_use_title = false
    #filename_as_phototitle = false
    images_downloadable = false
    images_downloadable_use_orig = false
    #taxonomies_links = false
    [[params.header.links]]
    #name = "à propos........"
    #url = "#footer"
    #icon = "fa-info-circle"

    # Footer panel

    [params.footer.paragraph]
    headline = "Françoise BOTREL REY, artiste peintre en Bretagne"
    text = "Beaucoup de couleurs, des portraits, des paysages, des bateaux, des animaux…, des balades aussi ! Les affiches vous permettront de suivre mes actualités, mes expositions et mon univers artistique et bien sûr, des extraits de mon catalogue."

    [params.footer.contact]
    hide = true # Set this to true if you don't want to have a contact form on your site    
    
    # Voir "Bout de codes" : autorise html dans le markdown.....     
[markup]
    [markup.goldmark]
        [markup.goldmark.extensions]
            [markup.goldmark.extensions.passthrough]
                enable = true
                [markup.goldmark.extensions.passthrough.delimiters]
                    block = [['\[', '\]'], ['$$', '$$']]
                    inline = [['\(', '\)']]
        [markup.goldmark.renderHooks]
            [markup.goldmark.renderHooks.link]
                useEmbedded = "fallback"
        [markup.goldmark.renderer]
# sans la commande ci-dessous, le html ne fonctionne pas...
            unsafe = true            
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
    [markup.highlight]
      anchorLineNos = false
      codeFences = true
      guessSyntax = false
      hl_Lines = ''
      hl_inline = false
      lineAnchors = ''
      lineNoStart = 1
      lineNos = false
      lineNumbersInTable = true
      noClasses = true
      style = 'monokai'
      tabWidth = 4
      wrapperClass = 'highlight'      
        
[params.render_hooks.image]
errorLevel = 'warning' # ignore (default), warning, or error (fails the build)
            
[module]
    [module.hugoVersion]
     extended = true 
           
            
